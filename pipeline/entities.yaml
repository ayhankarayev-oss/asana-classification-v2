# entities.yaml - Complete entity dictionary for the preprocessing pipeline.
# Update this file to add/remove tracked entities without modifying Python code.
#
# Rules:
#   - Within each category, list LONGER variants FIRST to prevent partial matches.
#   - Matching is case-insensitive and uses word boundaries.
#   - Category keys in extraction output:
#       platforms.<subcategory>  (e.g., "platforms.portfolio")
#       custodians
#       banks
#       advisor_orgs
#       clients                 (household/client entity names)

